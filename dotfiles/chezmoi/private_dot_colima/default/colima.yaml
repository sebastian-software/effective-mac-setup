# Colima default profile tuned for Apple Silicon Macs.
#
# VZ uses Apple's Virtualization.framework and virtiofs gives the fastest Colima
# file mounts on macOS 13+. This profile keeps Docker CLI compatibility while
# avoiding Docker Desktop and wide home-directory mounts.

cpu: 4
memory: 8
disk: 100

arch: aarch64
runtime: docker
vmType: vz
mountType: virtiofs

# Keep the default profile native ARM. Avoid Rosetta and binfmt so amd64 images
# do not run accidentally; use a separate Colima profile for explicit emulation.
rosetta: false
binfmt: false

# File event forwarding is experimental. Enable it only if a containerized
# watcher/hot-reload workflow needs it.
mountInotify: false

autoActivate: true

mounts:
  - location: ~/Workspace
    writable: true

docker:
  features:
    buildkit: true
